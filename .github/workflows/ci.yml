name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Type check
        run: mypy app/
      - name: Test
        env:
          EXTRACTOR: fake
        run: pytest

  container:
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t manuens:${{ github.sha }} .
      - name: Smoke test
        run: |
          docker run -d --name manuens-smoke -p 8000:8000 -e EXTRACTOR=fake manuens:${{ github.sha }}
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8000/healthz; then exit 0; fi
            sleep 1
          done
          echo "healthz never became ready"
          docker logs manuens-smoke
          exit 1
      - name: Stop smoke container
        if: always()
        run: docker rm -f manuens-smoke || true
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Tag and push
        if: github.event_name == 'push'
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          docker tag manuens:${{ github.sha }} "$IMAGE:${{ github.sha }}"
          docker tag manuens:${{ github.sha }} "$IMAGE:latest"
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

  deploy:
    needs: container
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret not set yet — skipping deploy trigger."
            echo "Once the Render service is created from render.yaml, add its deploy hook"
            echo "URL as a repo secret named RENDER_DEPLOY_HOOK_URL to enable this step."
            exit 0
          fi
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
      - name: Wait for Render health check
        if: ${{ vars.RENDER_URL != '' }}
        env:
          RENDER_URL: ${{ vars.RENDER_URL }}
        run: |
          for i in $(seq 1 40); do
            if curl -sf "$RENDER_URL/healthz"; then exit 0; fi
            sleep 10
          done
          echo "Render deploy did not become healthy in time"
          exit 1
